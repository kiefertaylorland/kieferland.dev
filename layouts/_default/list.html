{{ define "main" }}
<section class="writing-section">
  <h1 class="page-title">{{ .Title }}</h1>
  <div class="writing-list">
    {{ range .Pages.ByDate.Reverse }}
    <a href="{{ .RelPermalink }}" class="writing-row">
      <span class="writing-date">{{ .Date.Format "Jan 2, 2006" }}</span>
      <span class="writing-body">
        <span class="writing-title">{{ .Title }}</span>
        <span class="writing-excerpt">{{ .Description }}</span>
      </span>
      <span class="writing-read">{{ .ReadingTime }} min</span>
    </a>
    {{ end }}
  </div>
</section>
{{ end }}
