{{ define "main" }} {{ if eq .Section "writing" }}
<article class="post">
  <div class="post-meta">
    <span class="eyebrow">{{ .Date.Format "Jan 2, 2006" }} · {{ .ReadingTime }} min</span>
    {{ if .Draft }}<span class="badge badge-draft">Draft</span>{{ end }}
  </div>
  <h1 class="page-title post-title">{{ .Title }}</h1>
  <div class="post-body">{{ .Content }}</div>
</article>
{{ else }}
<div class="prose-page">{{ .Content }}</div>
{{ end }} {{ end }}
